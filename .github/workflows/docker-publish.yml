name: Publish Docker image

# Builds and pushes ghcr.io/yoshiofthewire/spinmatch on:
#   - push to main            -> always publish
#   - daily schedule          -> publish only if yt-dlp has a newer release
#                                than the one baked into the current :latest image
#   - manual dispatch         -> always publish
on:
  push:
    branches: [main]
  schedule:
    - cron: "17 6 * * *" # daily, 06:17 UTC
  workflow_dispatch:

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/spinmatch

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Resolve latest yt-dlp version from PyPI
        id: ytdlp
        run: |
          set -euo pipefail
          latest=$(curl -fsSL https://pypi.org/pypi/yt-dlp/json | jq -r .info.version)
          if [ -z "$latest" ] || [ "$latest" = "null" ]; then
            echo "Could not resolve latest yt-dlp version from PyPI" >&2
            exit 1
          fi
          echo "latest=$latest" >> "$GITHUB_OUTPUT"
          echo "Latest yt-dlp on PyPI: $latest"

      - name: Decide whether to build
        id: decide
        env:
          IMAGE_LC: ${{ env.IMAGE }}
          LATEST: ${{ steps.ytdlp.outputs.latest }}
          EVENT: ${{ github.event_name }}
        run: |
          set -euo pipefail
          # push and manual runs always build; only the daily schedule gates on version.
          if [ "$EVENT" != "schedule" ]; then
            echo "build=true" >> "$GITHUB_OUTPUT"
            echo "Event is $EVENT -> building unconditionally."
            exit 0
          fi
          image_lc=$(echo "$IMAGE_LC" | tr '[:upper:]' '[:lower:]')
          # Read the ytdlp.version label off the currently published :latest image.
          # A missing image / label (e.g. first-ever run) -> treat as needs-build.
          current=$(skopeo inspect "docker://${image_lc}:latest" 2>/dev/null \
            | jq -r '.Labels["ytdlp.version"] // ""' || true)
          echo "Published image yt-dlp: '${current:-<none>}' | PyPI latest: '$LATEST'"
          if [ "$current" = "$LATEST" ]; then
            echo "build=false" >> "$GITHUB_OUTPUT"
            echo "Already up to date -> skipping build."
          else
            echo "build=true" >> "$GITHUB_OUTPUT"
            echo "New yt-dlp release (or no published image) -> building."
          fi

      - name: Checkout
        if: steps.decide.outputs.build == 'true'
        uses: actions/checkout@v4

      - name: Normalize image name to lowercase
        if: steps.decide.outputs.build == 'true'
        id: img
        run: echo "name=$(echo "$IMAGE" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        if: steps.decide.outputs.build == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: steps.decide.outputs.build == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        if: steps.decide.outputs.build == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          build-args: |
            YTDLP_VERSION=${{ steps.ytdlp.outputs.latest }}
          tags: |
            ${{ steps.img.outputs.name }}:latest
            ${{ steps.img.outputs.name }}:${{ github.sha }}
